# MySQL with custom configuration
auth:
  rootPassword: "customroot123"
  database: "customdb"
  username: "customuser"
  password: "custompass123"

primary:
  configuration: |
    max_connections=150
    innodb_buffer_pool_size=128M
  resourcesPreset: "medium"
  persistence:
    enabled: false
  initContainers:
    - name: volume-permissions
      image: busybox:latest
      command: ["sh", "-c", "chown -R 1001:1001 /data/mysql"]
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: data
          mountPath: /data/mysql
